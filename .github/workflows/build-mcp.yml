name: build-mcp

# Baut das MCP-Server-Image und pusht es nach GHCR. Watchtower auf dem Host
# zieht das neue :latest automatisch (taeglicher Poll bzw. HTTP-Trigger).

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
      - '.github/workflows/build-mcp.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          tags: ghcr.io/xenofex7/bexio-mcp:latest
