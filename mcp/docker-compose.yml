services:
  bexio-mcp:
    build: .
    container_name: bexio-mcp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # OAuth mode (claude.ai). Leave empty for Claude Code pass-through only.
      - BEXIO_API_TOKEN=${BEXIO_API_TOKEN:-}
      - PUBLIC_URL=${PUBLIC_URL:-}
      - OAUTH_PASSWORD=${OAUTH_PASSWORD:-}
